  kind: system
  content: 2025年深秋，一场突如其来的7.4级地震摧毁了扎波罗热核电站最后一道备用冷却回路，大量放射性蒸汽向第聂伯河两岸扩散。国际原子能机构发出最高警报，要求俄乌双方在72小时内建立协同封控区，否则整个东欧将面临不可逆的生态灾难。此刻，四位关键人物必须在各自的立场上做出回应。
